[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://shop-production-d82a.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/storage/*"
  to = "https://shop-production-d82a.up.railway.app/storage/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/images/*"
  to = "https://shop-production-d82a.up.railway.app/images/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
