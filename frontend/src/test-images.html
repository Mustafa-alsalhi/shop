<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Product Images</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .btn {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px;
        }
        .btn:hover {
            background: #0056b3;
        }
        .result {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin: 10px 0;
        }
        .success {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .product-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .order-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .order-item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🖼️ Test Product Images</h1>
    
    <div>
        <button class="btn" onclick="testProductImages()">Test Product Images</button>
        <button class="btn" onclick="testOrderItems()">Test Order Items</button>
        <button class="btn" onclick="testOrders()">Test Orders with Images</button>
    </div>
    
    <div id="results"></div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        let token = localStorage.getItem('token');

        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong><br>${message}`;
            results.appendChild(div);
            results.scrollTop = results.scrollHeight;
        }

        function createProductGrid(products) {
            let html = '<div class="product-grid">';
            products.forEach(product => {
                const imageUrl = product.image_url && product.image_url !== 'null' 
                    ? (product.image_url.startsWith('http') ? product.image_url : `http://localhost:8000${product.image_url}`)
                    : `https://picsum.photos/seed/${encodeURIComponent(product.name)}/150/150.jpg`;
                
                html += `
                    <div class="product-card">
                        <img src="${imageUrl}" alt="${product.name}" class="product-image" onerror="this.src='https://picsum.photos/seed/fallback/150/150.jpg'">
                        <h4>${product.name}</h4>
                        <p><strong>ID:</strong> ${product.id}</p>
                        <p><strong>Image URL:</strong> ${product.image_url || 'NULL'}</p>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        function createOrderItemsList(orderItems) {
            let html = '<h3>Order Items:</h3>';
            orderItems.forEach(item => {
                const imageUrl = item.image_url && item.image_url !== 'null' 
                    ? (item.image_url.startsWith('http') ? item.image_url : `http://localhost:8000${item.image_url}`)
                    : `https://picsum.photos/seed/${encodeURIComponent(item.product_name)}/80/80.jpg`;
                
                html += `
                    <div class="order-item">
                        <img src="${imageUrl}" alt="${item.product_name}" class="order-item-image" onerror="this.src='https://picsum.photos/seed/fallback/80/80.jpg'">
                        <div>
                            <h4>${item.product_name}</h4>
                            <p><strong>Quantity:</strong> ${item.quantity}</p>
                            <p><strong>Price:</strong> $${item.price}</p>
                            <p><strong>Image URL:</strong> ${item.image_url || 'NULL'}</p>
                        </div>
                    </div>
                `;
            });
            return html;
        }

        async function testProductImages() {
            try {
                log('Testing product images...');
                const response = await fetch(`${API_BASE}/test-images`);
                const data = await response.json();
                
                if (response.ok) {
                    log(`✅ Found ${data.products.length} products`, 'success');
                    log(createProductGrid(data.products));
                } else {
                    log(`❌ Error: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function testOrderItems() {
            try {
                log('Testing order items...');
                if (!token) {
                    log('❌ No token found. Please login first.', 'error');
                    return;
                }
                
                const response = await fetch(`${API_BASE}/test-order-items`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log(`✅ Found ${data.order_items.length} order items`, 'success');
                    log(createOrderItemsList(data.order_items));
                } else {
                    log(`❌ Error: ${response.status}`, 'error');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function testOrders() {
            try {
                log('Testing orders with images...');
                if (!token) {
                    log('❌ No token found. Please login first.', 'error');
                    return;
                }
                
                const response = await fetch(`${API_BASE}/orders`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log(`✅ Found ${data.data ? data.data.length : 0} orders`, 'success');
                    
                    if (data.data && data.data.length > 0) {
                        data.data.forEach(order => {
                            log(`<h4>Order #${order.id} - ${order.order_number}</h4>`);
                            log(createOrderItemsList(order.order_items || []));
                        });
                    }
                } else {
                    log(`❌ Error: ${response.status}`, 'error');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        // Auto-test on load
        window.onload = () => {
            log('🖼️ Product Images Test Tool Loaded');
            log('Current token: ' + (token ? 'Found' : 'Not found'));
        };
    </script>
</body>
</html>
